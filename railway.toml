# Railway Configuration
# Last Update: 2026-01-27 22:30:00 UTC - Commit 7e153e2 - GDPR Panel
[build]
builder = "nixpacks"

[build.nixpacksPlan]
phases.setup.nixPkgs = ["nodejs", "git"]
phases.install.cmds = [
  "npm ci --no-cache",
  "echo 'Build started at:' $(date -u)"
]
phases.build.cmds = [
  "rm -rf node_modules/.vite build dist .cache",
  "echo 'Forcing clean build - clearing all caches'",
  "echo '--- Environment Check ---'",
  "[ -n \"$CAMPUS_CONTROLLER_URL\" ] && echo '✓ CAMPUS_CONTROLLER_URL set' || echo '⚠  CAMPUS_CONTROLLER_URL not set (will use hardcoded default)'",
  "[ -n \"$ALLOWED_ORIGINS\" ] && echo '✓ ALLOWED_ORIGINS set' || echo '⚠  ALLOWED_ORIGINS not set (CORS will allow all origins in production)'",
  "[ -n \"$VITE_SUPABASE_URL\" ] && echo '✓ VITE_SUPABASE_URL set' || echo '⚠  VITE_SUPABASE_URL not set (Network Rewind / Supabase features will be disabled)'",
  "[ -n \"$VITE_SUPABASE_ANON_KEY\" ] && echo '✓ VITE_SUPABASE_ANON_KEY set' || echo '⚠  VITE_SUPABASE_ANON_KEY not set (Network Rewind / Supabase features will be disabled)'",
  "echo '-------------------------'",
  "npm run build",
  "echo 'Version generated by build script:'",
  "cat build/version.json",
  "ls -la build/ | head -20",
  "echo 'Build completed at:' $(date -u)"
]

[deploy]
startCommand = "node server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
